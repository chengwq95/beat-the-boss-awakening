  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%23d9493e'/%3E%3Ctext x='8' y='49' font-size='45'%3E👊%3C/text%3E%3C/svg%3E">
  <style>

    *{box-sizing:border-box}body{margin:0;background:#e8e0d3;color:var(--ink);font:16px/1.35 ui-rounded,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;min-height:100vh}button{font:inherit;color:inherit;touch-action:manipulation;cursor:pointer}button:focus-visible{outline:3px solid var(--orange);outline-offset:2px}.shell{max-width:1180px;margin:auto;padding:18px 16px 42px}.top{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:14px}.brand{font-size:clamp(24px,5vw,40px);font-weight:950;letter-spacing:-1.5px;line-height:1}.brand small{display:block;font-size:11px;letter-spacing:2.2px;color:var(--red);margin-top:6px}.top-actions{display:flex;gap:8px}.icon-btn,.small-btn{background:var(--card);border:2px solid var(--ink);border-radius:10px;padding:8px 10px;font-weight:800;box-shadow:3px 3px 0 var(--ink)}.icon-btn:active,.small-btn:active,.shop-btn:active,.choice:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}.stat{background:var(--ink);color:#fff;border-radius:12px;padding:9px 11px;min-width:0}.stat b{display:block;color:#ffd76b;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stat span{font-size:11px;opacity:.75}.grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.9fr);gap:16px}.panel{background:var(--card);border:3px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.battle{min-height:500px;position:relative;background:linear-gradient(160deg,#d5eef4 0 52%,#d6c7ad 52%)}.scene-head{background:#fffdf8e8;padding:13px 16px;border-bottom:2px solid var(--ink);display:flex;justify-content:space-between;gap:10px;align-items:center}.stage{font-weight:900}.badge{font-size:12px;background:var(--orange);padding:4px 8px;border-radius:999px;font-weight:850}.boss-area{height:290px;display:grid;place-items:center;position:relative;overflow:hidden}.office-window{position:absolute;inset:22px 12% auto;height:82px;border:6px solid #8ea4a8;background:linear-gradient(#a6dbe7 60%,#8fbac7 60%)}.office-window:before{content:"";position:absolute;left:49%;top:0;bottom:0;border-left:5px solid #8ea4a8}.boss{z-index:2;position:relative;width:180px;height:182px;border:3px solid var(--ink);border-radius:48% 48% 22% 22%;background:linear-gradient(90deg,#384358,#62728a 48%,#263044 49%);box-shadow:inset -18px -8px #17233a44,6px 9px 0 #17233a;display:grid;place-items:center;user-select:none;transition:transform .08s}.boss:before{content:"😤";font-size:78px;filter:drop-shadow(0 3px #fff8)}.boss.hit{transform:translateY(7px) scale(.96) rotate(-2deg)}.boss.stunned{filter:grayscale(.55);animation:wobble .35s infinite}.weakpoint{z-index:4;position:absolute;width:56px;height:56px;border:3px solid var(--ink);border-radius:50%;background:#ffe164;font-size:30px;display:none;box-shadow:4px 4px 0 var(--ink);animation:pulse .55s infinite}.weakpoint.show{display:block}.damage{position:absolute;z-index:6;font-weight:1000;font-size:25px;color:#fff;text-shadow:2px 2px 0 var(--ink),-1px -1px 0 var(--ink);pointer-events:none;animation:float .7s forwards}.feedback{padding:0 16px 14px}.bar-label{display:flex;justify-content:space-between;font-weight:850;font-size:13px;margin:8px 0 4px}.bar{height:17px;background:#27364e;border:2px solid var(--ink);border-radius:999px;overflow:hidden}.fill{height:100%;width:100%;background:linear-gradient(90deg,#ee5b4b,#f5b43e);transition:width .15s}.rage .fill{background:linear-gradient(90deg,#e54338,#f6de4d)}.cast-box{display:block;height:60px;overflow:hidden;visibility:hidden;background:#422b38;color:#fff;border:2px solid var(--ink);padding:8px 10px;border-radius:9px;margin-top:9px;font-weight:800;white-space:nowrap;text-overflow:ellipsis}.cast-box.show{visibility:visible}.cast-fill{height:7px;background:#f8cd62;width:100%;margin-top:5px;transition:width .1s}.combo-line{display:flex;justify-content:space-between;gap:12px;margin-top:9px;font-size:13px;font-weight:800}.tap{display:block;width:calc(100% - 32px);margin:10px 16px 16px;border:3px solid var(--ink);border-radius:14px;padding:15px;background:var(--red);color:#fff;font-size:24px;font-weight:1000;letter-spacing:1px;box-shadow:5px 5px 0 var(--ink)}.tap:disabled{background:#927c7c}.skills{border-top:3px solid var(--ink);padding:12px 16px;background:#f8ead0}.skills h2,.side h2{font-size:16px;margin:0 0 8px}.skill-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.skill{border:2px solid var(--ink);border-radius:10px;background:#fffdf8;padding:9px 5px;min-height:74px;font-weight:900;box-shadow:3px 3px 0 var(--ink);font-size:13px}.skill b{display:block;font-size:19px}.skill[disabled]{opacity:.48;cursor:not-allowed;box-shadow:none}.side{display:flex;flex-direction:column;gap:14px}.side .panel{padding:14px}.shop-list{display:grid;gap:8px;max-height:390px;overflow:auto;padding-right:2px}.shop-item{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px dashed var(--line);padding:8px 0}.shop-item:last-child{border:0}.shop-item b{display:block;font-size:14px}.shop-item span{font-size:12px;color:var(--muted);display:block}.shop-btn{align-self:center;border:2px solid var(--ink);border-radius:8px;background:#f8cf66;font-size:12px;font-weight:900;padding:7px 8px;min-width:82px}.shop-btn:disabled{background:#d7d0c5;color:#777;box-shadow:none}.inventory{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.item{border:2px solid var(--ink);background:#fff7df;border-radius:10px;padding:8px 5px;text-align:center;font-size:12px;font-weight:850}.item b{display:block;font-size:22px}.item button{margin-top:5px;border:1px solid var(--ink);background:#fff;border-radius:5px;padding:3px 6px;font-size:11px;font-weight:800}.log{background:#202d43;color:#eaf5ff;border-radius:11px;padding:10px;min-height:68px;font-size:12px;overflow:hidden}.log div{animation:appear .25s}.modal{position:fixed;z-index:10;inset:0;background:#17233acc;display:none;place-items:center;padding:18px}.modal.show{display:grid}.modal-box{width:min(520px,100%);background:var(--paper);border:4px solid var(--ink);border-radius:18px;box-shadow:9px 9px 0 #0a101d;padding:22px;text-align:center}.modal h2{margin:0 0 5px;font-size:28px}.choices{display:grid;gap:10px;margin-top:18px}.choice{border:3px solid var(--ink);border-radius:11px;background:#fffdf8;padding:12px;text-align:left;box-shadow:4px 4px 0 var(--ink);font-weight:900}.choice span{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-top:2px}.toast{position:fixed;z-index:20;left:50%;bottom:18px;transform:translate(-50%,120px);background:var(--ink);color:#fff;border:2px solid #fff;padding:9px 14px;border-radius:999px;font-weight:800;transition:.25s;max-width:90%;text-align:center}.toast.show{transform:translate(-50%,0)}@keyframes float{to{opacity:0;transform:translateY(-75px) scale(1.3)}}@keyframes pulse{50%{transform:scale(1.18);background:#ff815e}}@keyframes wobble{50%{transform:rotate(2deg)}}@keyframes appear{from{opacity:0;transform:translateX(8px)}}
    @media(max-width:760px){.shell{padding:11px 10px 30px}.hud{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.battle{min-height:0}.boss-area{height:238px}.side{display:grid;grid-template-columns:1fr;gap:12px}.shop-list{max-height:280px}.top{align-items:flex-start}.top-actions{flex-wrap:wrap;justify-content:flex-end}.stat b{font-size:16px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
  </style>
<style>.boss:before{content:none}.boss-face{font-size:78px;line-height:1;filter:drop-shadow(0 3px #fff8);transition:transform .12s}.boss.hit .boss-face{transform:scale(.9)}</style>
</head>
<body>
<main class="shell">
  <header class="top"><div class="brand">暴打老板：打工人觉醒<small>怒气 · 弱点 · 技能</small></div><div class="top-actions"><button class="icon-btn" id="soundBtn" aria-pressed="true">🔊 音效：开</button><button class="icon-btn" id="prestigeBtn">🏅 辞职周目</button><button class="icon-btn" id="resetBtn">重置</button></div></header>
  <section class="hud"><div class="stat"><span>奖金</span><b id="gold">0</b></div><div class="stat"><span>点击伤害</span><b id="clickPower">1</b></div><div class="stat"><span>自动伤害 / 秒</span><b id="dps">0</b></div><div class="stat"><span>本周目</span><b id="prestige">0</b></div></section>
  <section class="grid">
    <section class="panel battle"><div class="scene-head"><div><div class="stage" id="bossName">第 1 关 · 组长</div><small id="bossTrait">普通关：老板会缓慢回血</small></div><div class="badge" id="timeBadge">平稳期</div></div>
      <div class="boss-area" id="bossArea"><div class="office-window"></div><div class="boss" id="boss" aria-label="点击攻击老板"><span class="boss-face" id="bossFace">😤</span></div><button class="weakpoint" id="weakpoint" aria-label="攻击弱点">🎯</button></div>
      <div class="feedback"><div class="bar-label"><span>老板血量</span><span id="hpText">100 / 100</span></div><div class="bar"><div class="fill" id="hpBar"></div></div><div class="bar-label rage"><span>怒气 <i id="rageText">0/100</i></span><span id="statusText">准备开干</span></div><div class="bar rage"><div class="fill" id="rageBar"></div></div><div class="cast-box" id="castBox"><span id="castText">📊 老板正在施放...</span><div class="bar"><div class="cast-fill" id="castBar"></div></div></div><div class="combo-line"><span id="comboText">连击 0 · 伤害 +0%</span><span id="buffText">暂无临时增益</span></div></div>
      <button class="tap" id="attackBtn">👊 狠狠地打！</button>
      <div class="skills"><h2>怒气技能</h2><div class="skill-row"><button class="skill" data-skill="euler"><b>👊 连续欧拉</b><span>5秒：点击 ×3</span></button><button class="skill" data-skill="overtime"><b>☕ 加班爆发</b><span>10秒：DPS ×2</span></button><button class="skill" data-skill="arbitration"><b>⚖️ 劳动仲裁</b><span>扣 15% 最大生命</span></button></div></div>
    </section>
    <aside class="side"><section class="panel"><h2>🎒 应急道具</h2><div class="inventory" id="inventory"></div></section><section class="panel"><h2>🛠️ 职场军火库</h2><div class="shop-list" id="shop"></div></section><section class="panel"><h2>📣 战况</h2><div class="log" id="log"></div></section></aside>
  </section>
</main>
<div class="modal" id="rewardModal"><div class="modal-box"><h2>🎉 晋升奖励</h2><p>第 <b id="rewardLevel">5</b> 关突破。选一项永久增强。</p><div class="choices" id="choices"></div></div></div>
<div class="modal" id="chestModal"><div class="modal-box"><h2>🎁 发现老板抽屉</h2><p id="chestText">打开后获得奖励。</p><div class="choices"><button class="choice" id="openChest">打开宝箱</button></div></div></div><div class="toast" id="toast"></div>
<script>
(() => {
  'use strict';
  const KEY='bossBrawlSaveV2', OLD_KEYS=['bossBrawlSave','bossGameSave','hitBossSave','fightBossSave'];
  const $=id=>document.getElementById(id); const nf=n=>Math.floor(n||0).toLocaleString('zh-CN'); const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
  const bosses=['组长','部门经理','项目总监','HR 总监','副总裁','CEO','资本化身'];
  const shop=[
    ['🖱️ 电竞鼠标','click',2,25,'点击伤害 +2'],['⌨️ 机械键盘','click',8,120,'点击伤害 +8'],['🥊 拳击手套','click',30,650,'点击伤害 +30'],['🖲️ 连点鼠标','double',0,900,'5% 概率追加一次点击'],
    ['☕ 实习生','dps',2,45,'自动伤害 +2 /秒'],['🤖 AI 机器人','dps',12,260,'自动伤害 +12 /秒'],['🪑 人体工学椅','dps',45,1350,'自动伤害 +45 /秒'],['🌐 自动化脚本','dps',180,6800,'自动伤害 +180 /秒'],
    ['🎧 降噪耳机','resist',.2,1100,'负面状态缩短 20%'],['📚 劳动法大全','enrage',.2,1900,'狂暴关伤害 +20%'],['🧾 报销单','gold',.1,950,'所有金币 +10%'],['🍀 幸运领带','crit',.03,2400,'暴击率 +3%']
  ];
  const items={energy:{icon:'⚡',name:'能量饮料',desc:'10秒点击 ×5'},coffee:{icon:'☕',name:'双倍咖啡',desc:'20秒 DPS ×3'},freeze:{icon:'❄️',name:'冻结时间',desc:'暂停狂暴 / 回血 8秒'}};
  const defaultState=()=>({version:2,gold:0,level:1,prestige:0,click:1,dps:0,crit:.05,critMult:5,sound:true,starterGrant:false,owned:{},inv:{energy:1,coffee:1,freeze:1},perks:{click:0,dps:0,crit:0},stats:{clicks:0,kills:0,crit:0},lastSave:Date.now()});
  function migrate(raw){const d=defaultState(); if(!raw||typeof raw!=='object')return d; const n=(...v)=>{for(const x of v)if(Number.isFinite(+x))return +x;return undefined};
    d.gold=n(raw.gold,raw.coins,raw.money,raw.cash)??d.gold;d.level=Math.max(1,n(raw.level,raw.stage,raw.bossLevel,current(raw,'currentLevel'))??1);d.prestige=n(raw.prestige,raw.rebirth,raw.loop)??0;d.click=n(raw.click,raw.clickPower,raw.clickDamage,raw.damage)??d.click;d.dps=n(raw.dps,raw.autoDps,raw.dpsPower)??0;d.crit=n(raw.crit,raw.critChance)??d.crit;d.critMult=n(raw.critMult,raw.criticalMultiplier)??d.critMult;d.sound=raw.sound!==false;d.starterGrant=raw.starterGrant===true;d.owned=raw.owned||raw.items||{};d.inv={...d.inv,...(raw.inv||raw.inventory||{})};d.perks={...d.perks,...(raw.perks||{})};d.stats={...d.stats,...(raw.stats||{})};return d; }
  function current(o,k){return o[k]}
  let saved; try{saved=JSON.parse(localStorage.getItem(KEY)||'null');if(!saved)for(const k of OLD_KEYS){const x=JSON.parse(localStorage.getItem(k)||'null');if(x){saved=x;break}}}catch(e){} let s=migrate(saved);
  let hp=0,maxHp=0,last=performance.now(),combo=0,lastHit=0,weak={active:false,until:0},cast=null,stunUntil=0,freezeUntil=0,buffs={click:0,dps:0,clickFactor:1,dpsFactor:1},cooldowns={euler:0,overtime:0,arbitration:0},lockedUntil=0,lastCastAt=0,chestPending=false;
  const bossesHp=()=>Math.floor(80*Math.pow(1.52,s.level-1)*(1+s.prestige*.16)); const isEnrage=()=>s.level%5===0; const bossLabel=()=>bosses[(s.level-1)%bosses.length]; const faceFor=pn=>{const ratio=hp/maxHp;if(pn<stunUntil)return '😵‍💫';if(ratio<=.12)return '😭';if(ratio<=.4)return '😫';if(cast)return '😤';return ['😠','😤','😡','🧐','😈','🤬','🤑'][(s.level-1)%7]};
  const multiplier=()=>1+s.prestige*.12+(s.perks.click||0); const totalClick=()=>s.click*multiplier()*(Date.now()<buffs.click?(buffs.clickFactor||3):1); const totalDps=()=>s.dps*(1+s.prestige*.12+(s.perks.dps||0))*(Date.now()<buffs.dps?(buffs.dpsFactor||2):1); const goldMult=()=>1+s.prestige*.2+(s.owned['10']||0)*.1;
  let audio=null,lastSound=0;function unlockAudio(){if(!s.sound)return;try{audio=audio||new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume()}catch(e){}}function playSound(kind){if(!s.sound||!audio||audio.state!=='running')return;const now=audio.currentTime;if(kind==='tap'&&now-lastSound<.055)return;lastSound=now;const tones={tap:[190,.055,'square',.045],crit:[470,.13,'triangle',.075],weak:[760,.2,'sawtooth',.07],skill:[290,.16,'square',.06],win:[392,.33,'triangle',.08],bad:[105,.2,'sawtooth',.055],buy:[520,.08,'sine',.05]}[kind]||[240,.08,'sine',.04];try{const o=audio.createOscillator(),g=audio.createGain();o.type=tones[2];o.frequency.setValueAtTime(tones[0],now);o.frequency.exponentialRampToValueAtTime(Math.max(55,tones[0]*(kind==='bad'?.55:1.45)),now+tones[1]);g.gain.setValueAtTime(tones[3],now);g.gain.exponentialRampToValueAtTime(.001,now+tones[1]);o.connect(g).connect(audio.destination);o.start(now);o.stop(now+tones[1])}catch(e){}}
  function toast(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('show'),2300)}function log(t){const d=document.createElement('div');d.textContent=t;$('log').prepend(d);while($('log').children.length>4)$('log').lastElementChild.remove()}
  function save(){s.lastSave=Date.now();localStorage.setItem(KEY,JSON.stringify(s))}
  function newBoss(){maxHp=bossesHp();hp=maxHp;combo=0;weak={active:false,until:performance.now()+5000+Math.random()*5000};cast=null;lastCastAt=performance.now();lastBossStart=performance.now();render();}
  function grantStarter(){if(s.starterGrant)return; s.gold+=50;s.starterGrant=true;toast('🧧 获得开工补贴：50 奖金');log('开工补贴到账，先去买一件趁手装备！')}
  function init(){newBoss();grantStarter();const elapsed=Math.min(8*3600e3,Date.now()-(s.lastSave||Date.now()));if(elapsed>60000&&s.dps>0){const g=Math.floor(totalDps()*elapsed/1000*.4);s.gold+=g;toast(`离线 ${Math.floor(elapsed/60000)} 分钟，自动赚到 ${nf(g)} 奖金`)}renderShop();renderInventory();log('打工人已就位。点击老板积攒怒气！');save()}
  function burst(text,amount,critical=false){const e=document.createElement('span');e.className='damage';e.textContent=(critical?'暴击！ ':'')+'-'+nf(amount);e.style.left=(42+Math.random()*22)+'%';e.style.top=(35+Math.random()*20)+'%';e.style.color=critical?'#ffe164':'#fff';$('bossArea').append(e);setTimeout(()=>e.remove(),750);$('boss').classList.add('hit');setTimeout(()=>$('boss').classList.remove('hit'),90)}
  function hit(base,source='点击',canCombo=false){if(hp<=0||performance.now()<lockedUntil)return;let dmg=base,critical=false;if(Math.random()<s.crit+(s.perks.crit||0)){dmg*=s.critMult;critical=true;s.stats.crit++}if(canCombo){const now=performance.now();combo=now-lastHit<1500?combo+1:1;lastHit=now;dmg*=1+comboBonus();s.stats.clicks++;s.rage=clamp((s.rage||0)+2,0,100);if(s.owned['3']&&Math.random()<.05)setTimeout(()=>hit(base,'连点',false),10)}if(isEnrage())dmg*=1+(s.owned['9']||0)*.2;if(cast){cast.interrupt+=dmg;if(cast.interrupt>=cast.need)interruptCast()}hp-=dmg;burst(source,dmg,critical);if(source!=='自动')playSound(source==='弱点命中'?'weak':source==='劳动仲裁'?'skill':critical?'crit':'tap');if(hp<=0)kill();render()}
  function comboBonus(){if(combo>=100)return 1;if(combo>=50)return .5;if(combo>=25)return .25;if(combo>=10)return .1;return 0}
  function attack(){hit(totalClick(),'点击',true)}
  function weakHit(e){e.stopPropagation();if(!weak.active)return;const dmg=totalClick()*30;weak={active:false,until:performance.now()+7000+Math.random()*7000};hit(dmg,'弱点命中',false);toast('🎯 弱点命中！30 倍点击伤害！');log('精准击穿老板的弱点！')}
  function skill(k){unlockAudio();const now=Date.now();if((s.rage||0)<100||now<cooldowns[k])return;if(k==='euler'){buffs.click=now+5000;buffs.clickFactor=3;cooldowns[k]=now+30000;playSound('skill');toast('连续欧拉：5 秒内点击伤害 ×3')}if(k==='overtime'){buffs.dps=now+10000;buffs.dpsFactor=2;cooldowns[k]=now+35000;playSound('skill');toast('加班爆发：10 秒内 DPS ×2')}if(k==='arbitration'){cooldowns[k]=now+45000;hit(maxHp*.15,'劳动仲裁',false);toast('劳动仲裁：扣除 15% 最大生命！')}s.rage=0;render()}
  function useItem(k){if(!s.inv[k])return;s.inv[k]--;const now=Date.now();if(k==='energy'){buffs.click=now+10000;buffs.clickFactor=5;toast('能量饮料生效：10 秒点击 ×5')}if(k==='coffee'){buffs.dps=now+20000;buffs.dpsFactor=3;toast('双倍咖啡生效：20 秒 DPS ×3')}if(k==='freeze'){freezeUntil=performance.now()+8000;toast('时间冻结：8 秒内老板停止回复与狂暴倒计时')}renderInventory();save()}
  function startCast(){if(cast||performance.now()<stunUntil)return;const pool=[['📊 强制开会','meeting'],['🛡️ 画大饼','shield'],['💼 PUA 绩效','pua']];const [name,type]=pool[Math.floor(Math.random()*pool.length)];cast={name,type,end:performance.now()+4000,need:maxHp*.08,interrupt:0};log(`老板发动「${name}」，快造成伤害打断！`);render()}
  function interruptCast(){playSound('win');toast('✅ 成功打断！老板眩晕 5 秒、承伤更高');log('读条被打断，老板原地发呆！');stunUntil=performance.now()+5000;cast=null}
  function castFail(){const type=cast.type;cast=null;playSound('bad');const resistance=1-Math.min(.7,(s.owned['8']||0)*.2);if(type==='meeting'){lockedUntil=performance.now()+3000*resistance;toast('强制开会：暂时无法攻击！')}if(type==='shield'){hp=Math.min(maxHp,hp+maxHp*.1);toast('画大饼：老板恢复 10% 生命！')}if(type==='pua'){buffs.click=Math.min(buffs.click||0,Date.now());lockedUntil=performance.now()+1200*resistance;toast('PUA 绩效：你愣住了！')}log('没能打断老板技能。')}
  function kill(){playSound('win');const reward=Math.max(15,Math.floor(maxHp*.35*goldMult()));s.gold+=reward;s.stats.kills++;toast(`击败 ${bossLabel()}！+${nf(reward)} 奖金`);log(`击败第 ${s.level} 关，拿到 ${nf(reward)} 奖金。`);s.level++;let rewardDue=(s.level-1)%5===0;chestPending=Math.random()<.35||rewardDue;newBoss();save();if(rewardDue)setTimeout(showPerks,450);else if(chestPending)setTimeout(showChest,450)}
  function showPerks(){const set=[['手速达人','点击伤害永久 +20%',()=>s.perks.click=(s.perks.click||0)+.2],['自动化专家','自动伤害永久 +20%',()=>s.perks.dps=(s.perks.dps||0)+.2],['幸运员工','暴击率永久 +3%',()=>s.perks.crit=(s.perks.crit||0)+.03],['劳动保障','每关获得 1 件随机应急道具',()=>{const k=Object.keys(items)[Math.floor(Math.random()*3)];s.inv[k]=(s.inv[k]||0)+1}]].sort(()=>Math.random()-.5).slice(0,3);$('rewardLevel').textContent=s.level-1;$('choices').innerHTML='';set.forEach(([n,d,fn])=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`${n}<span>${d}</span>`;b.onclick=()=>{fn();$('rewardModal').classList.remove('show');toast('永久奖励已生效');save();render();if(chestPending)setTimeout(showChest,250)};$('choices').append(b)});$('rewardModal').classList.add('show')}
  function showChest(){if(!chestPending)return;$('chestText').textContent='老板抽屉里似乎有点好东西。';$('chestModal').classList.add('show')}
  function openChest(){chestPending=false;let r=Math.random();let message;if(r<.5){const g=Math.floor(maxHp*.35);s.gold+=g;message=`获得 ${nf(g)} 奖金`}else if(r<.88){const k=Object.keys(items)[Math.floor(Math.random()*3)];s.inv[k]=(s.inv[k]||0)+1;message=`获得 ${items[k].icon} ${items[k].name}`}else{s.crit+=.01;message='获得史诗幸运领带碎片：暴击率 +1%'}$('chestModal').classList.remove('show');toast('🎁 '+message);log('宝箱：'+message);save();render()}
  function buy(i){unlockAudio();const x=shop[i],count=s.owned[i]||0,price=Math.floor(x[3]*Math.pow(1.18,count));if(s.gold<price)return toast('奖金不够，再打几下！');s.gold-=price;s.owned[i]=count+1;if(x[1]==='click')s.click+=x[2];if(x[1]==='dps')s.dps+=x[2];if(x[1]==='crit')s.crit+=x[2];playSound('buy');save();render();renderShop()}
  function renderShop(){$('shop').innerHTML='';shop.forEach((x,i)=>{let n=s.owned[i]||0,p=Math.floor(x[3]*Math.pow(1.18,n));let row=document.createElement('div');row.className='shop-item';row.innerHTML=`<div><b>${x[0]} <small>Lv.${n}</small></b><span>${x[4]}</span></div><button class="shop-btn" ${s.gold<p?'disabled':''}>${nf(p)} 金</button>`;row.querySelector('button').onclick=()=>buy(i);$('shop').append(row)})}
  function refreshShopAffordability(){document.querySelectorAll('.shop-btn').forEach((button,i)=>{const x=shop[i],n=s.owned[i]||0,p=Math.floor(x[3]*Math.pow(1.18,n));button.disabled=s.gold<p;button.textContent=`${nf(p)} 金`})}
  function renderInventory(){$('inventory').innerHTML='';Object.entries(items).forEach(([k,v])=>{const n=s.inv[k]||0;let e=document.createElement('div');e.className='item';e.innerHTML=`<b>${v.icon} ×${n}</b>${v.name}<button ${n?'':'disabled'}>使用</button>`;e.querySelector('button').onclick=()=>useItem(k);$('inventory').append(e)})}
  function render(){let now=Date.now(),pn=performance.now();$('gold').textContent=nf(s.gold);$('clickPower').textContent=nf(totalClick());$('dps').textContent=nf(totalDps());$('prestige').textContent='第 '+s.prestige+' 周目';$('bossName').textContent=`第 ${s.level} 关 · ${bossLabel()}`;$('bossTrait').textContent=isEnrage()?'狂暴关：30 秒内击败，奖励翻倍':'普通关：老板会缓慢回血';$('hpText').textContent=`${nf(Math.max(0,hp))} / ${nf(maxHp)}`;$('hpBar').style.width=clamp(hp/maxHp*100,0,100)+'%';$('rageText').textContent=`${Math.floor(s.rage||0)}/100`;$('rageBar').style.width=(s.rage||0)+'%';let timeLeft=isEnrage()?Math.max(0,30-((pn-lastBossStart)/1000)):0;$('timeBadge').textContent=isEnrage()?`狂暴 ${timeLeft.toFixed(1)}s`:'平稳期';$('comboText').textContent=`连击 ${combo} · 伤害 +${Math.round(comboBonus()*100)}%`;$('buffText').textContent=[now<buffs.click?'⚡手速暴走':'',now<buffs.dps?'☕自动加班':''].filter(Boolean).join(' ')||'暂无临时增益';$('bossFace').textContent=faceFor(pn);$('weakpoint').classList.toggle('show',weak.active);$('weakpoint').style.left=(weak.x||50)+'%';$('weakpoint').style.top=(weak.y||48)+'%';$('boss').classList.toggle('stunned',pn<stunUntil);$('attackBtn').disabled=pn<lockedUntil;$('attackBtn').textContent=pn<lockedUntil?'📊 正在被迫开会…':'👊 狠狠地打！';const box=$('castBox');box.classList.toggle('show',!!cast);if(cast){$('castText').textContent=`${cast.name} · 造成 ${nf(Math.max(0,cast.need-cast.interrupt))} 伤害即可打断`;$('castBar').style.width=clamp((cast.end-pn)/4000*100,0,100)+'%'}document.querySelectorAll('.skill').forEach(b=>{let k=b.dataset.skill,cd=Math.ceil((cooldowns[k]-now)/1000),ready=(s.rage||0)>=100&&cd<=0;b.disabled=!ready;let txt={euler:'👊 连续欧拉',overtime:'☕ 加班爆发',arbitration:'⚖️ 劳动仲裁'}[k];b.querySelector('b').textContent=cd>0?`${txt} ${cd}s`:txt});refreshShopAffordability()}
  let lastBossStart=performance.now(); function tick(t){const dt=Math.min(.25,(t-last)/1000);last=t;if(hp>0){if(t>=stunUntil)hit(totalDps()*dt,'自动',false);if(!isEnrage()&&t>=freezeUntil&&!cast){const regen=Math.min(maxHp*.00035,Math.max(.4,totalDps()*.25));hp=Math.min(maxHp,hp+regen*dt)}if(isEnrage()&&t>=freezeUntil&&t-lastBossStart>30000){hp=maxHp;lastBossStart=t;combo=0;toast('狂暴失败，老板满血反扑！');log('狂暴关重置。喝冻结时间再试！')}if(!weak.active&&t>weak.until){weak={active:true,until:t+1200,x:20+Math.random()*60,y:24+Math.random()*45};setTimeout(()=>{if(weak.active&&performance.now()>weak.until){weak={active:false,until:performance.now()+7000+Math.random()*7000};render()}},1250)}if(!cast&&t-lastCastAt>11000+Math.random()*8000){startCast();lastCastAt=t}if(cast&&t>=cast.end)castFail();if(t-lastHit>1500)combo=0}render();requestAnimationFrame(tick)}
  $('attackBtn').addEventListener('click',()=>{unlockAudio();attack()});$('boss').addEventListener('click',()=>{unlockAudio();attack()});$('weakpoint').addEventListener('click',weakHit);document.querySelectorAll('.skill').forEach(b=>b.addEventListener('click',()=>skill(b.dataset.skill)));$('openChest').onclick=openChest;$('soundBtn').onclick=()=>{s.sound=!s.sound;if(s.sound)unlockAudio();$('soundBtn').textContent=s.sound?'🔊 音效：开':'🔇 音效：关';$('soundBtn').setAttribute('aria-pressed',String(s.sound));if(s.sound)playSound('buy');save()};$('prestigeBtn').onclick=()=>{if(s.level<15)return toast('至少打到第 15 关才可辞职周目！');if(!confirm('辞职后关卡与商店重置，获得永久全伤害与金币加成。确定？'))return;s.prestige++;s.gold=0;s.level=1;s.click=1;s.dps=0;s.owned={};s.rage=0;newBoss();save();toast('🏅 成功辞职！第 '+s.prestige+' 周目开始');renderShop();renderInventory()};$('resetBtn').onclick=()=>{if(confirm('确定清空本游戏存档吗？此操作无法撤销。')){localStorage.removeItem(KEY);s=defaultState();s.gold=50;s.starterGrant=true;lastBossStart=performance.now();newBoss();save();renderShop();renderInventory();toast('🧧 已开始新人生涯，获得 50 开工补贴！')}};window.addEventListener('beforeunload',save);init();$('soundBtn').textContent=s.sound?'🔊 音效：开':'🔇 音效：关';$('soundBtn').setAttribute('aria-pressed',String(s.sound));requestAnimationFrame(tick);
})();
</script>
</body></html>
